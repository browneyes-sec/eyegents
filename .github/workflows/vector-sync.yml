name: Sync Vector Index

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: read

jobs:
  sync-vector-index:
    name: Sync Vector Index
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Build indexer image
        run: docker build -t eyegents-indexer:latest -f vector-index/Dockerfile .

      - name: Start Qdrant
        run: |
          docker run -d --name qdrant \
            -p 6333:6333 \
            -v qdrant-data:/qdrant/storage \
            qdrant/qdrant:v1.12.0
          sleep 10
          curl -sf http://localhost:6333/health

      - name: Start Ollama
        run: |
          docker run -d --name ollama \
            -p 11434:11434 \
            -v ollama-data:/root/.ollama \
            ollama/ollama:latest
          sleep 30
          docker exec ollama ollama pull qwen2.5-coder:7b-q4_K_M
          docker exec ollama ollama pull bge-m3:latest
          docker exec ollama ollama tag qwen2.5-coder:7b-q4_K_M qwen2.5-coder:7b

      - name: Index codebase
        env:
          QDRANT_URL: http://localhost:6333
          OLLAMA_URL: http://localhost:11434/v1
        run: |
          docker run --rm --network host \
            -v $(pwd):/workspace:ro \
            -e QDRANT_URL=http://localhost:6333 \
            -e OLLAMA_URL=http://localhost:11434/v1 \
            -e CHUNK_MAX_TOKENS=512 \
            -e BATCH_SIZE=32 \
            eyegents-indexer:latest

      - name: Cleanup
        if: always()
        run: |
          docker rm -f qdrant ollama || true