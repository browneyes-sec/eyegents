name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  aider-lint-gate:
    # Extra validation gate for Aider-generated commits
    # Catches any code that bypassed pre-commit hooks (Aider defaults)
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.head_commit.message, 'aider') ||
      contains(github.event.pull_request.body, 'aider') ||
      contains(github.event.head_commit.message, 'Aider')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Lint changed files
        run: npm run lint
      - name: Typecheck all packages
        run: npm run typecheck
      - name: Check no secrets leaked in diff
        run: |
          if git diff HEAD~1 --name-only 2>/dev/null | xargs grep -l "sk-or-" 2>/dev/null; then
            echo "❌ OpenRouter API key prefix found in diff — secrets may have leaked"
            exit 1
          fi
          echo "✅ No secrets detected in diff"
      - name: Validate Aider model metadata alignment
        run: |
          if [ -f scripts/validate-aider-models.sh ]; then
            bash scripts/validate-aider-models.sh
          else
            echo "⚠️  validate-aider-models.sh not found — skipping"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build MCP server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp-server/Dockerfile
          push: false
          tags: eyegents/mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build indexer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vector-index/Dockerfile
          push: false
          tags: eyegents-indexer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
