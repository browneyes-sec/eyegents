services:
  ollama:
    image: ollama/ollama:latest
    container_name: eyegents-ollama
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
      - ./models:/models:ro
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=f16
      - OLLAMA_NUM_THREAD=4
      - OLLAMA_NUMA=1
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: "2.5G"
        reservations:
          cpus: "1.5"
          memory: "1G"
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: eyegents-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__ENABLE_CORS=true
      - QDRANT__TELEMETRY__ENABLED=false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "512M"


  mcp-server:
    build:
      context: ..
      dockerfile: mcp-server/Dockerfile
      target: production
    container_name: eyegents-mcp
    restart: unless-stopped
    ports: ["3001:3001"]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production
      - LOG_LEVEL=warn
    depends_on:
      - qdrant
      - ollama
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  indexer:
    build:
      context: ..
      dockerfile: vector-index/Dockerfile
      target: production
    container_name: eyegents-indexer
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - WATCH_MODE=${WATCH_MODE:-false}
      - CHUNK_MAX_TOKENS=512
      - CHUNK_OVERLAP=50
      - BATCH_SIZE=32
    volumes:
      - ..:/workspace:ro
      - indexer-cache:/cache
    depends_on:
      - qdrant
      - ollama
    profiles: ["indexing"]

volumes:
  ollama-data:
  qdrant-data:
  indexer-cache:

networks:
  default:
    name: eyegents-net