# OpenRouter Service Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.openrouter.yml up
#
# This overlay adds OpenRouter-specific configuration to the base stack.
# It does NOT replace the base configuration — it merges with it.

services:
  mcp-server:
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CODING_MODEL=${CODING_MODEL:-openrouter/qwen/qwen3-coder:free}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-openrouter/deepseek/deepseek-v4-flash:free}
      - ROUTER_MODEL=${ROUTER_MODEL:-openrouter/free}
      # Legacy aliases (backward compat)
      - NEMOTRON_MODEL=${NEMOTRON_MODEL:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-}
      - GH_PAT=${GH_PAT}
      - OPENROUTER_SITE_URL=https://github.com/browneyes-sec/eyegents
      - OPENROUTER_SITE_TITLE=eyegents
